runConfig:
  concurrency: 80
  # Keep one instance always warm to avoid cold-start latency on the first visit
  # (pages are dynamic/SSR; with minInstances 0 a cold visitor waited ~4-5s).
  minInstances: 1

# All values come from Secret Manager secrets in the active project.
# - New standalone project (magnolia-services): secrets created from the
#   project's own firebase-adminsdk service-account key + ADMIN_PASSWORD.
# - Legacy backend (magscmembership): supplies these via per-backend overrideEnv,
#   which overrides this file, so it is unaffected.
env:
  - variable: FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: FIREBASE_PRIVATE_KEY_BASE64
    secret: FIREBASE_PRIVATE_KEY_BASE64
  - variable: ADMIN_PASSWORD
    secret: ADMIN_PASSWORD
  - variable: NEXT_PUBLIC_MEMBERSHIP_URL
    value: https://magnolia-membership--magscmembership.us-east4.hosted.app
  - variable: NEXT_PUBLIC_APP_URL
    value: https://magnolia-services--magnolia-services.us-central1.hosted.app
